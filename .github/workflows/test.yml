name: Test

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check version bump
        run: |
          current_version=$(cat VERSION)
          previous_version=$(git show main:VERSION 2>/dev/null || echo "")
          if [ -z "$previous_version" ]; then
            echo "No previous version found, skipping version check"
          elif [ "$current_version" = "$previous_version" ]; then
            echo "ERROR: Version not bumped! Current: $current_version, Previous: $previous_version"
            echo "Please update VERSION file before pushing to main"
            exit 1
          else
            echo "Version bumped: $previous_version -> $current_version"
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@v4.0.0

      - name: Use Node.js v24
        uses: actions/setup-node@v5
        with:
          node-version: v24
          registry-url: https://registry.npmjs.org/
          cache: pnpm

      - run: pnpm install

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test
